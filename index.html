<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Quote Generator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#667eea,#764ba2);
        padding:20px;
    }

    .container{
        width:100%;
        max-width:700px;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(15px);
        border:1px solid rgba(255,255,255,0.2);
        border-radius:25px;
        padding:40px 30px;
        text-align:center;
        color:#fff;
        box-shadow:0 8px 30px rgba(0,0,0,0.25);
    }

    h1{
        margin-bottom:25px;
        font-size:2rem;
    }

    .quote-box{
        min-height:180px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
    }

    .quote{
        font-size:1.5rem;
        line-height:1.7;
        margin-bottom:20px;
        transition:0.3s ease;
    }

    .author{
        font-size:1rem;
        opacity:0.85;
    }

    .buttons{
        margin-top:30px;
        display:flex;
        justify-content:center;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        border:none;
        padding:12px 22px;
        border-radius:50px;
        cursor:pointer;
        font-size:1rem;
        font-weight:600;
        transition:0.3s ease;
    }

    .generate{
        background:#fff;
        color:#764ba2;
    }

    .generate:hover{
        transform:translateY(-3px);
    }

    .tweet{
        background:#1DA1F2;
        color:white;
    }

    .tweet:hover{
        transform:translateY(-3px);
    }

    .fade{
        opacity:0;
        transform:translateY(10px);
    }

    @media(max-width:600px){
        .quote{
            font-size:1.2rem;
        }

        h1{
            font-size:1.7rem;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>✨ Random Quote Generator</h1>

    <div class="quote-box">
        <p id="quote" class="quote">Click the button to generate a quote.</p>
        <span id="author" class="author"></span>
    </div>

    <div class="buttons">
        <button class="generate" onclick="generateQuote()">New Quote</button>
        <button class="tweet" onclick="tweetQuote()">Tweet Quote</button>
    </div>
</div>

<script>
const quotes = [
    {
        quote: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        author: "Winston Churchill"
    },
    {
        quote: "The future depends on what you do today.",
        author: "Mahatma Gandhi"
    },
    {
        quote: "Dream big and dare to fail.",
        author: "Norman Vaughan"
    },
    {
        quote: "Believe you can and you're halfway there.",
        author: "Theodore Roosevelt"
    },
    {
        quote: "Do one thing every day that scares you.",
        author: "Eleanor Roosevelt"
    },
    {
        quote: "The best way to predict the future is to create it.",
        author: "Peter Drucker"
    },
    {
        quote: "Your limitation—it's only your imagination.",
        author: "Unknown"
    },
    {
        quote: "Great things never come from comfort zones.",
        author: "Unknown"
    },
    {
        quote: "Push yourself, because no one else is going to do it for you.",
        author: "Unknown"
    },
    {
        quote: "Don't watch the clock; do what it does. Keep going.",
        author: "Sam Levenson"
    }
];

const quoteEl = document.getElementById("quote");
const authorEl = document.getElementById("author");

function generateQuote() {
    quoteEl.classList.add("fade");
    authorEl.classList.add("fade");

    setTimeout(() => {
        const random = quotes[Math.floor(Math.random() * quotes.length)];
        quoteEl.textContent = `"${random.quote}"`;
        authorEl.textContent = `— ${random.author}`;

        quoteEl.classList.remove("fade");
        authorEl.classList.remove("fade");
    }, 250);
}

function tweetQuote() {
    const quote = quoteEl.textContent;
    const author = authorEl.textContent;

    const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(
        quote + " " + author
    )}`;

    window.open(url, "_blank");
}

// Load first quote automatically
generateQuote();
</script>

</body>
</html>
